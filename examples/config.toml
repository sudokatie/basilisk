# Basilisk Configuration Example
# Copy to ~/.config/basilisk/config.toml

[font]
family = "JetBrains Mono"
size = 14.0
# bold_font = "JetBrains Mono Bold"
# italic_font = "JetBrains Mono Italic"

[colors]
# Tomorrow Night theme
foreground = "#c5c8c6"
background = "#1d1f21"
cursor = "#c5c8c6"

# Normal colors
black = "#282a2e"
red = "#a54242"
green = "#8c9440"
yellow = "#de935f"
blue = "#5f819d"
magenta = "#85678f"
cyan = "#5e8d87"
white = "#707880"

# Bright colors
bright_black = "#373b41"
bright_red = "#cc6666"
bright_green = "#b5bd68"
bright_yellow = "#f0c674"
bright_blue = "#81a2be"
bright_magenta = "#b294bb"
bright_cyan = "#8abeb7"
bright_white = "#c5c8c6"

[scrollback]
lines = 10000

[window]
width = 800
height = 600
decorations = "full"  # "full", "none", "transparent"
opacity = 1.0
padding = 2

[terminal]
shell = "/bin/zsh"
cols = 80
rows = 24
